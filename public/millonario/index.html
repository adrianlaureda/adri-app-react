<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¿Quién Quiere Ser Millonario? — Lengua 2º ESO</title>
<link rel="stylesheet" href="../_fonts/fonts.css">
<style>
  :root {
    --bg-primary: #050505;
    --bg-secondary: #0a0a0a;
    --bg-card: #111111;
    --bg-card-hover: #1a1a1a;
    --text-primary: #ffffff;
    --text-secondary: #888888;
    --text-muted: #444444;
    --border: rgba(255,255,255,0.08);
    --accent-1: #00d4aa;
    --accent-2: #00d4ff;
    --accent-3: #f5a623;
    --accent-4: #ff6b6b;
    --accent-5: #a78bfa;
    --accent-6: #4ade80;
    --success: #22c55e;
    --danger: #ef4444;
    --warning: #f59e0b;
    /* Colores específicos del millonario */
    --mill-blue: #0d1b3e;
    --mill-blue-light: #162d5a;
    --mill-gold: #d4a017;
    --mill-gold-light: #f0c040;
    --mill-diamond: #1a2a5e;
    --mill-diamond-active: #2a4a8e;
    --mill-diamond-done: #0a1a3e;
    --mill-safe: #d4a017;
  }

  body.light-mode {
    --bg-primary: #f5f5f5;
    --bg-secondary: #e8e8e8;
    --bg-card: #ffffff;
    --bg-card-hover: #f0f0f0;
    --text-primary: #111111;
    --text-secondary: #666666;
    --text-muted: #999999;
    --border: rgba(0,0,0,0.08);
    --mill-blue: #dde4f0;
    --mill-blue-light: #c5d0e8;
    --mill-diamond: #e0e6f2;
    --mill-diamond-active: #c0cce5;
    --mill-diamond-done: #eef1f8;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }

  /* ===================== BOTONES GLOBALES ===================== */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    border-radius: 10px;
    border: none;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary {
    background: var(--mill-gold);
    color: #000;
  }
  .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-ghost {
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--bg-card-hover); color: var(--text-primary); }
  .btn-danger {
    background: var(--danger);
    color: #fff;
  }
  .btn-danger:hover { opacity: 0.85; }

  /* ===================== NAV ===================== */
  .nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 56px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 100;
  }
  .nav-left { display: flex; align-items: center; gap: 12px; }
  .nav-title { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
  .nav-subtitle { font-size: 12px; color: var(--text-secondary); }
  .nav-right { display: flex; align-items: center; gap: 8px; }

  .icon-btn {
    width: 38px; height: 38px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .icon-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }

  /* ===================== SCREENS ===================== */
  .screen {
    display: none;
    min-height: 100vh;
    padding-top: 56px;
  }
  .screen.active { display: flex; }

  /* ===================== SETUP SCREEN ===================== */
  #screen-setup {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    padding: 80px 20px;
  }

  .setup-logo {
    text-align: center;
  }
  .setup-logo h1 {
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 900;
    background: linear-gradient(135deg, var(--mill-gold-light), var(--mill-gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
  }
  .setup-logo p {
    color: var(--text-secondary);
    font-size: 14px;
    margin-top: 8px;
  }

  .setup-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 480px;
  }

  .setup-card label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .team-count-selector {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  .team-count-btn {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: transparent;
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .team-count-btn:hover { border-color: var(--mill-gold); }
  .team-count-btn.active {
    border-color: var(--mill-gold);
    background: rgba(212, 160, 23, 0.15);
    color: var(--mill-gold-light);
  }

  .team-names {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 24px;
  }
  .team-names input {
    width: 100%;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg-secondary);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    transition: border-color 0.2s;
  }
  .team-names input:focus {
    outline: none;
    border-color: var(--mill-gold);
  }
  .team-names input::placeholder { color: var(--text-muted); }

  /* ===================== GAME SCREEN ===================== */
  #screen-game {
    flex-direction: column;
    padding: 70px 20px 20px;
    gap: 16px;
    min-height: 100vh;
  }

  /* Barra de equipo actual */
  .team-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 20px;
    flex-shrink: 0;
  }
  .team-bar-name {
    font-weight: 700;
    font-size: 16px;
  }
  .team-bar-prize {
    font-weight: 700;
    color: var(--mill-gold-light);
    font-size: 16px;
  }

  /* Layout principal del juego */
  .game-layout {
    display: flex;
    gap: 16px;
    flex: 1;
    min-height: 0;
  }

  /* Panel de pregunta */
  .question-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-width: 0;
  }

  /* Comodines */
  .lifelines {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  .lifeline-btn {
    flex: 1;
    padding: 10px 12px;
    border-radius: 10px;
    border: 2px solid var(--mill-blue-light);
    background: var(--mill-blue);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .lifeline-btn:hover:not(.used) {
    background: var(--mill-blue-light);
    transform: translateY(-1px);
  }
  .lifeline-btn.used {
    opacity: 0.3;
    cursor: not-allowed;
    text-decoration: line-through;
  }

  /* Pregunta */
  .question-box {
    background: var(--mill-blue);
    border: 2px solid var(--mill-gold);
    border-radius: 16px;
    padding: 24px;
    text-align: center;
    flex-shrink: 0;
  }
  .question-number {
    font-size: 12px;
    font-weight: 700;
    color: var(--mill-gold);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .question-text {
    font-size: clamp(16px, 2.5vw, 20px);
    font-weight: 600;
    line-height: 1.5;
  }

  /* Opciones */
  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    flex-shrink: 0;
  }
  .option-btn {
    position: relative;
    padding: 16px 20px;
    border-radius: 12px;
    border: 2px solid var(--mill-blue-light);
    background: var(--mill-blue);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .option-btn:hover:not(.disabled):not(.eliminated) {
    background: var(--mill-blue-light);
    border-color: var(--mill-gold);
    transform: translateY(-1px);
  }
  .option-letter {
    font-weight: 800;
    color: var(--mill-gold);
    min-width: 20px;
  }
  .option-btn.correct {
    background: rgba(34, 197, 94, 0.3);
    border-color: var(--success);
    animation: pulse-correct 0.5s ease;
  }
  .option-btn.wrong {
    background: rgba(239, 68, 68, 0.3);
    border-color: var(--danger);
    animation: shake 0.5s ease;
  }
  .option-btn.eliminated {
    opacity: 0.15;
    cursor: not-allowed;
    pointer-events: none;
  }
  .option-btn.disabled {
    cursor: not-allowed;
    pointer-events: none;
  }

  @keyframes pulse-correct {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  /* Botón plantarse */
  .plant-row {
    display: flex;
    justify-content: center;
    flex-shrink: 0;
  }
  .btn-plant {
    padding: 10px 28px;
    border-radius: 10px;
    border: 2px solid var(--warning);
    background: transparent;
    color: var(--warning);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-plant:hover {
    background: rgba(245, 158, 11, 0.15);
  }

  /* Panel de comodín (llamada/público) */
  .lifeline-result {
    background: var(--bg-card);
    border: 1px solid var(--mill-gold);
    border-radius: 12px;
    padding: 16px 20px;
    font-size: 14px;
    color: var(--text-primary);
    flex-shrink: 0;
    display: none;
  }
  .lifeline-result.visible { display: block; }
  .lifeline-result-title {
    font-weight: 700;
    color: var(--mill-gold);
    margin-bottom: 6px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Barras del público */
  .audience-bars {
    display: flex;
    align-items: flex-end;
    gap: 12px;
    height: 100px;
    margin-top: 8px;
  }
  .audience-bar {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .audience-bar-fill {
    width: 100%;
    background: var(--mill-gold);
    border-radius: 4px 4px 0 0;
    transition: height 0.5s ease;
    min-height: 4px;
  }
  .audience-bar-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-secondary);
  }
  .audience-bar-pct {
    font-size: 11px;
    color: var(--mill-gold-light);
    font-weight: 600;
  }

  /* ===================== ESCALERA DE PREMIOS ===================== */
  .prize-ladder {
    width: 220px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex-shrink: 0;
    align-self: center;
  }
  .prize-step {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 6px 12px;
    font-size: 13px;
    font-weight: 600;
    border-radius: 6px;
    background: var(--mill-diamond);
    color: var(--text-muted);
    transition: all 0.3s;
    position: relative;
  }
  .prize-step.safe {
    color: var(--mill-gold);
    font-weight: 700;
  }
  .prize-step.safe::before {
    content: '';
    position: absolute;
    left: 4px;
    width: 6px; height: 6px;
    background: var(--mill-gold);
    border-radius: 50%;
  }
  .prize-step.current {
    background: var(--mill-diamond-active);
    color: var(--text-primary);
    border: 1px solid var(--mill-gold);
    transform: scale(1.05);
  }
  .prize-step.done {
    background: var(--mill-diamond-done);
    color: var(--text-muted);
  }

  /* ===================== RESULT OVERLAY ===================== */
  .result-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 20px;
  }
  .result-overlay.visible { display: flex; }
  .result-card {
    background: var(--bg-card);
    border: 2px solid var(--mill-gold);
    border-radius: 20px;
    padding: 40px;
    text-align: center;
    max-width: 480px;
    width: 100%;
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }
  .result-card h2 {
    font-size: 24px;
    margin-bottom: 8px;
  }
  .result-card .result-prize {
    font-size: 36px;
    font-weight: 900;
    color: var(--mill-gold-light);
    margin: 16px 0;
  }
  .result-card .result-reason {
    color: var(--text-secondary);
    font-size: 14px;
    margin-bottom: 24px;
  }

  /* ===================== RANKING SCREEN ===================== */
  #screen-ranking {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    padding: 80px 20px;
  }
  .ranking-title {
    text-align: center;
  }
  .ranking-title h1 {
    font-size: 32px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--mill-gold-light), var(--mill-gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .ranking-title p {
    color: var(--text-secondary);
    margin-top: 4px;
  }

  .ranking-list {
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .ranking-item {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 24px;
    transition: all 0.2s;
  }
  .ranking-item:first-child {
    border-color: var(--mill-gold);
    background: rgba(212, 160, 23, 0.08);
  }
  .ranking-position {
    font-size: 28px;
    font-weight: 900;
    color: var(--mill-gold);
    min-width: 40px;
  }
  .ranking-item:nth-child(2) .ranking-position { color: var(--text-secondary); }
  .ranking-item:nth-child(3) .ranking-position { color: #cd7f32; }
  .ranking-info { flex: 1; }
  .ranking-name { font-weight: 700; font-size: 16px; }
  .ranking-detail { font-size: 13px; color: var(--text-secondary); }
  .ranking-prize {
    font-weight: 800;
    font-size: 20px;
    color: var(--mill-gold-light);
  }

  /* ===================== RESPONSIVE ===================== */
  @media (max-width: 768px) {
    .game-layout {
      flex-direction: column-reverse;
    }
    .prize-ladder {
      flex-direction: row;
      flex-wrap: wrap;
      width: 100%;
      gap: 4px;
      justify-content: center;
    }
    .prize-step {
      font-size: 11px;
      padding: 4px 8px;
    }
    .options-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>

<!-- ===================== NAV ===================== -->
<nav class="nav">
  <div class="nav-left">
    <a href="../index.html" class="icon-btn" title="Inicio">
      <!-- Lucide: home -->
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </a>
    <div>
      <div class="nav-title">Quien Quiere Ser Millonario</div>
      <div class="nav-subtitle">Lengua 2.o ESO — Refuerzo</div>
    </div>
  </div>
  <div class="nav-right">
    <button class="icon-btn" id="btn-theme" title="Cambiar tema">
      <!-- Lucide: moon (se cambia dinamicamente) -->
      <svg id="icon-theme" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</nav>

<!-- ===================== PANTALLA SETUP ===================== -->
<div class="screen active" id="screen-setup">
  <div class="setup-logo">
    <h1>Quien Quiere Ser<br>Millonario?</h1>
    <p>Lengua Castellana y Literatura — 2.o ESO</p>
  </div>

  <div class="setup-card">
    <label>Numero de equipos</label>
    <div class="team-count-selector">
      <button class="team-count-btn active" data-count="2">2</button>
      <button class="team-count-btn" data-count="3">3</button>
      <button class="team-count-btn" data-count="4">4</button>
    </div>

    <label>Nombres de los equipos</label>
    <div class="team-names" id="team-names">
      <input type="text" placeholder="Equipo 1" data-team="0">
      <input type="text" placeholder="Equipo 2" data-team="1">
    </div>

    <button class="btn btn-primary" style="width:100%; justify-content:center; margin-top: 8px;" id="btn-start">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Comenzar
    </button>
  </div>
</div>

<!-- ===================== PANTALLA JUEGO ===================== -->
<div class="screen" id="screen-game">
  <!-- Barra superior con equipo actual -->
  <div class="team-bar">
    <div>
      <span class="team-bar-name" id="current-team-name">Equipo 1</span>
      <span style="color: var(--text-muted); font-size: 13px;" id="current-team-turn"></span>
    </div>
    <div class="team-bar-prize" id="current-prize">0 EUR</div>
  </div>

  <div class="game-layout">
    <!-- Panel de pregunta (izquierda / principal) -->
    <div class="question-panel">
      <!-- Comodines -->
      <div class="lifelines">
        <button class="lifeline-btn" id="ll-5050" onclick="useLifeline('5050')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4" y1="12" x2="20" y2="12"/></svg>
          50:50
        </button>
        <button class="lifeline-btn" id="ll-phone" onclick="useLifeline('phone')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          Llamada
        </button>
        <button class="lifeline-btn" id="ll-audience" onclick="useLifeline('audience')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Publico
        </button>
      </div>

      <!-- Resultado comodin -->
      <div class="lifeline-result" id="lifeline-result">
        <div class="lifeline-result-title" id="lifeline-result-title"></div>
        <div id="lifeline-result-content"></div>
      </div>

      <!-- Pregunta -->
      <div class="question-box">
        <div class="question-number" id="question-number">Pregunta 1 — 100 EUR</div>
        <div class="question-text" id="question-text">Cargando...</div>
      </div>

      <!-- Opciones -->
      <div class="options-grid" id="options-grid">
        <button class="option-btn" data-idx="0"><span class="option-letter">A</span><span class="option-text"></span></button>

    { question: "Un texto que mezcla 'Habia una vez un cientifico que descubrio...' con datos reales sobre un descubrimiento, es fundamentalmente...", options: ["Solo narrativo", "Solo expositivo", "Narrativo con elementos expositivos", "Argumentativo"], correct: 2, hint: "Mi amigo dice que es la C... cuenta una historia (narrativo) pero incluye informacion objetiva (expositivo). Predomina la narracion." },
    { question: "Que prefijo convierte 'hacer' en su antonimo?", options: ["Re-", "Des-", "Pre-", "Anti-"], correct: 1, hint: "Un amigo dice que piensa que es la B... 'deshacer' significa lo contrario de 'hacer'." },

// =====================================================================
// CONFIGURACION DEL JUEGO
// =====================================================================

var PRIZE_LADDER = [
  100, 200, 500, 1000, 2000,
  5000, 10000, 20000, 50000, 75000,
  100000, 150000, 300000, 500000, 1000000
];

// Hitos seguros: pregunta 4 (1.000 EUR, indice 3) y pregunta 10 (75.000 EUR, indice 9)
var SAFE_HAVENS = [3, 9];

// Mapeo: pregunta i a nivel de dificultad
function getDifficultyLevel(questionIndex) {
  if (questionIndex < 3) return 1;
  if (questionIndex < 6) return 2;
  if (questionIndex < 9) return 3;
  if (questionIndex < 12) return 4;
  return 5;
}

// =====================================================================
// ESTADO DEL JUEGO
// =====================================================================

var teams = [];
var currentTeamIndex = 0;
var currentQuestionIndex = 0;
var currentQuestions = []; // Las 15 preguntas seleccionadas para el equipo actual
var lifelines = { '5050': false, 'phone': false, 'audience': false };
var answered = false;
var gameFinished = false;

// =====================================================================
// FUNCIONES DE SETUP
// =====================================================================

// Selector de numero de equipos
document.querySelectorAll('.team-count-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.team-count-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    var count = parseInt(btn.dataset.count);
    renderTeamInputs(count);
  });
});

function renderTeamInputs(count) {
  var container = document.getElementById('team-names');
  container.textContent = '';
  for (var i = 0; i < count; i++) {
    var input = document.createElement('input');
    input.type = 'text';
    input.placeholder = 'Equipo ' + (i + 1);
    input.dataset.team = i;
    container.appendChild(input);
  }
}

// Boton comenzar
document.getElementById('btn-start').addEventListener('click', function() {
  var inputs = document.querySelectorAll('#team-names input');
  teams = [];
  inputs.forEach(function(input, i) {
    teams.push({
      name: input.value.trim() || ('Equipo ' + (i + 1)),
      prize: 0,
      finalPrize: 0,
      finished: false,
      questionsAnswered: 0
    });
  });
  currentTeamIndex = 0;
  gameFinished = false;
  startTeamTurn();
  showScreen('screen-game');
});

// =====================================================================
// LOGICA DEL JUEGO
// =====================================================================

// Seleccionar preguntas aleatorias para una partida completa
function selectQuestions() {
  var selected = [];
  for (var level = 1; level <= 5; level++) {
    var pool = QUESTIONS[level].slice();
    // Barajar el pool (Fisher-Yates)
    for (var i = pool.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var temp = pool[i];
      pool[i] = pool[j];
      pool[j] = temp;
    }
    // Tomar 3 preguntas de cada nivel
    selected = selected.concat(pool.slice(0, 3));
  }
  return selected;
}

function startTeamTurn() {
  currentQuestionIndex = 0;
  currentQuestions = selectQuestions();
  lifelines = { '5050': false, 'phone': false, 'audience': false };

  // Resetear UI de comodines
  document.getElementById('ll-5050').classList.remove('used');
  document.getElementById('ll-phone').classList.remove('used');
  document.getElementById('ll-audience').classList.remove('used');

  // Ocultar resultado de comodin
  document.getElementById('lifeline-result').classList.remove('visible');

  updateTeamBar();
  buildPrizeLadder();
  showQuestion();
}

function updateTeamBar() {
  var team = teams[currentTeamIndex];
  document.getElementById('current-team-name').textContent = team.name;
  document.getElementById('current-team-turn').textContent =
    '(' + (currentTeamIndex + 1) + ' de ' + teams.length + ')';

  var currentPrizeValue = currentQuestionIndex > 0
    ? PRIZE_LADDER[currentQuestionIndex - 1]
    : 0;
  document.getElementById('current-prize').textContent =
    formatPrize(currentPrizeValue);
}

function buildPrizeLadder() {
  var ladder = document.getElementById('prize-ladder');
  ladder.textContent = '';
  // De arriba (1M) a abajo (100)
  for (var i = PRIZE_LADDER.length - 1; i >= 0; i--) {
    var step = document.createElement('div');
    step.className = 'prize-step';
    step.dataset.index = i;

    if (SAFE_HAVENS.indexOf(i) !== -1) step.classList.add('safe');
    if (i === currentQuestionIndex) step.classList.add('current');
    if (i < currentQuestionIndex) step.classList.add('done');

    step.textContent = formatPrize(PRIZE_LADDER[i]);
    ladder.appendChild(step);
  }
}

function showQuestion() {
  answered = false;
  var q = currentQuestions[currentQuestionIndex];

  document.getElementById('question-number').textContent =
    'Pregunta ' + (currentQuestionIndex + 1) + ' \u2014 ' + formatPrize(PRIZE_LADDER[currentQuestionIndex]);
  document.getElementById('question-text').textContent = q.question;

  var buttons = document.querySelectorAll('.option-btn');
  buttons.forEach(function(btn, i) {
    btn.className = 'option-btn';
    btn.querySelector('.option-text').textContent = q.options[i];
    btn.onclick = function() { selectAnswer(i); };
  });

  // Ocultar resultado de comodin anterior
  document.getElementById('lifeline-result').classList.remove('visible');

  // Actualizar escalera
  buildPrizeLadder();
  updateTeamBar();
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;

  var q = currentQuestions[currentQuestionIndex];
  var buttons = document.querySelectorAll('.option-btn');

  // Deshabilitar todos los botones
  buttons.forEach(function(b) { b.classList.add('disabled'); });

  if (idx === q.correct) {
    // Correcto
    buttons[idx].classList.add('correct');
    setTimeout(function() {
      currentQuestionIndex++;
      if (currentQuestionIndex >= 15) {
        // Ha ganado el millon
        endTeamTurn(PRIZE_LADDER[14], 'Ha respondido las 15 preguntas correctamente!');
      } else {
        showQuestion();
      }
    }, 1500);
  } else {
    // Incorrecto
    buttons[idx].classList.add('wrong');
    buttons[q.correct].classList.add('correct');

    // Calcular premio (cae al ultimo hito seguro)
    var safePrize = 0;
    for (var s = 0; s < SAFE_HAVENS.length; s++) {
      if (currentQuestionIndex > SAFE_HAVENS[s]) {
        safePrize = PRIZE_LADDER[SAFE_HAVENS[s]];
      }
    }

    setTimeout(function() {
      endTeamTurn(safePrize, 'Respuesta incorrecta. La correcta era: ' + q.options[q.correct]);
    }, 2000);
  }
}

function plantarse() {
  if (answered) return;
  var prize = currentQuestionIndex > 0 ? PRIZE_LADDER[currentQuestionIndex - 1] : 0;
  endTeamTurn(prize, 'Se ha plantado voluntariamente.');
}

function endTeamTurn(prize, reason) {
  teams[currentTeamIndex].finalPrize = prize;
  teams[currentTeamIndex].finished = true;
  teams[currentTeamIndex].questionsAnswered = currentQuestionIndex;

  document.getElementById('result-title').textContent = teams[currentTeamIndex].name;
  document.getElementById('result-prize-amount').textContent = formatPrize(prize);
  document.getElementById('result-reason').textContent = reason;

  // Comprobar si quedan equipos
  var nextIdx = currentTeamIndex + 1;
  if (nextIdx >= teams.length) {
    document.getElementById('btn-next-team').textContent = 'Ver clasificacion';
  } else {
    document.getElementById('btn-next-team').textContent =
      'Turno de: ' + teams[nextIdx].name;
  }

  document.getElementById('result-overlay').classList.add('visible');
}

function nextTeam() {
  document.getElementById('result-overlay').classList.remove('visible');
  currentTeamIndex++;

  if (currentTeamIndex >= teams.length) {
    showRanking();
  } else {
    startTeamTurn();
  }
}

// =====================================================================
// COMODINES
// =====================================================================

function useLifeline(type) {
  if (lifelines[type] || answered) return;
  lifelines[type] = true;

  var q = currentQuestions[currentQuestionIndex];
  var resultEl = document.getElementById('lifeline-result');
  var titleEl = document.getElementById('lifeline-result-title');
  var contentEl = document.getElementById('lifeline-result-content');

  if (type === '5050') {
    document.getElementById('ll-5050').classList.add('used');
    // Elegir 2 respuestas incorrectas para eliminar
    var incorrectIndices = [0, 1, 2, 3].filter(function(i) { return i !== q.correct; });
    // Barajar y tomar 2
    for (var i = incorrectIndices.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var temp = incorrectIndices[i];
      incorrectIndices[i] = incorrectIndices[j];
      incorrectIndices[j] = temp;
    }
    var toRemove = incorrectIndices.slice(0, 2);
    var buttons = document.querySelectorAll('.option-btn');
    toRemove.forEach(function(idx) { buttons[idx].classList.add('eliminated'); });

  } else if (type === 'phone') {
    document.getElementById('ll-phone').classList.add('used');
    titleEl.textContent = 'Llamada a un amigo';
    contentEl.textContent = q.hint;
    resultEl.classList.add('visible');

  } else if (type === 'audience') {
    document.getElementById('ll-audience').classList.add('used');
    // Generar porcentajes donde la correcta tiene mas
    var pcts = generateAudiencePercentages(q.correct);
    var letters = ['A', 'B', 'C', 'D'];

    // Comprobar si hay opciones eliminadas por 50:50
    var optButtons = document.querySelectorAll('.option-btn');
    var eliminated = [];
    optButtons.forEach(function(btn, i) {
      if (btn.classList.contains('eliminated')) eliminated.push(i);
    });

    // Recalcular porcentajes si hay eliminadas
    if (eliminated.length > 0) {
      var adjustedPcts = [0, 0, 0, 0];
      var remaining = 100;
      var activeIndices = [0, 1, 2, 3].filter(function(i) { return eliminated.indexOf(i) === -1; });
      // La correcta obtiene entre 50% y 75%
      var correctPct = Math.floor(Math.random() * 26) + 50;
      adjustedPcts[q.correct] = correctPct;
      remaining -= correctPct;
      var otherActive = activeIndices.filter(function(i) { return i !== q.correct; });
      if (otherActive.length > 0) {
        adjustedPcts[otherActive[0]] = remaining;
      }
      pcts = adjustedPcts;
    }

    titleEl.textContent = 'Pregunta al publico';

    // Construir barras con DOM seguro
    contentEl.textContent = '';
    var barsContainer = document.createElement('div');
    barsContainer.className = 'audience-bars';

    for (var bi = 0; bi < 4; bi++) {
      var pct = eliminated.indexOf(bi) !== -1 ? 0 : pcts[bi];
      var height = Math.max(pct * 0.9, 2);

      var barDiv = document.createElement('div');
      barDiv.className = 'audience-bar';

      var pctLabel = document.createElement('div');
      pctLabel.className = 'audience-bar-pct';
      pctLabel.textContent = pct + '%';

      var fillDiv = document.createElement('div');
      fillDiv.className = 'audience-bar-fill';
      fillDiv.style.height = height + 'px';

      var letterLabel = document.createElement('div');
      letterLabel.className = 'audience-bar-label';
      letterLabel.textContent = letters[bi];

      barDiv.appendChild(pctLabel);
      barDiv.appendChild(fillDiv);
      barDiv.appendChild(letterLabel);
      barsContainer.appendChild(barDiv);
    }

    contentEl.appendChild(barsContainer);
    resultEl.classList.add('visible');
  }
}

function generateAudiencePercentages(correctIdx) {
  // La correcta obtiene entre 40% y 70%
  var correctPct = Math.floor(Math.random() * 31) + 40;
  var remaining = 100 - correctPct;

  var pcts = [0, 0, 0, 0];
  pcts[correctIdx] = correctPct;

  // Repartir el resto entre las incorrectas
  var wrongIndices = [0, 1, 2, 3].filter(function(i) { return i !== correctIdx; });
  for (var i = 0; i < wrongIndices.length - 1; i++) {
    var maxForThis = remaining - (wrongIndices.length - 1 - i);
    var val = Math.floor(Math.random() * Math.max(maxForThis, 1));
    pcts[wrongIndices[i]] = val;
    remaining -= val;
  }
  pcts[wrongIndices[wrongIndices.length - 1]] = remaining;

  return pcts;
}

// =====================================================================
// RANKING FINAL
// =====================================================================

function showRanking() {
  // Ordenar por premio final (descendente)
  var sorted = teams.slice().sort(function(a, b) { return b.finalPrize - a.finalPrize; });

  var list = document.getElementById('ranking-list');
  list.textContent = '';

  sorted.forEach(function(team, i) {
    var item = document.createElement('div');
    item.className = 'ranking-item';

    var posDiv = document.createElement('div');
    posDiv.className = 'ranking-position';
    posDiv.textContent = (i + 1);

    var infoDiv = document.createElement('div');
    infoDiv.className = 'ranking-info';

    var nameDiv = document.createElement('div');
    nameDiv.className = 'ranking-name';
    nameDiv.textContent = team.name;

    var detailDiv = document.createElement('div');
    detailDiv.className = 'ranking-detail';
    detailDiv.textContent = team.questionsAnswered + ' preguntas respondidas';

    infoDiv.appendChild(nameDiv);
    infoDiv.appendChild(detailDiv);

    var prizeDiv = document.createElement('div');
    prizeDiv.className = 'ranking-prize';
    prizeDiv.textContent = formatPrize(team.finalPrize);

    item.appendChild(posDiv);
    item.appendChild(infoDiv);
    item.appendChild(prizeDiv);
    list.appendChild(item);
  });

  showScreen('screen-ranking');
}

function resetGame() {
  teams = [];
  currentTeamIndex = 0;
  showScreen('screen-setup');
}

// =====================================================================
// UTILIDADES
// =====================================================================

function formatPrize(amount) {
  return amount.toLocaleString('es-ES') + ' \u20AC';
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

// Toggle tema claro/oscuro
document.getElementById('btn-theme').addEventListener('click', function() {
  document.body.classList.toggle('light-mode');
  var icon = document.getElementById('icon-theme');
  if (document.body.classList.contains('light-mode')) {
    // Lucide: sun
    icon.textContent = '';
    var circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', '12'); circle.setAttribute('cy', '12'); circle.setAttribute('r', '5');
    icon.appendChild(circle);
    var sunLines = [
      ['12','1','12','3'], ['12','21','12','23'],
      ['4.22','4.22','5.64','5.64'], ['18.36','18.36','19.78','19.78'],
      ['1','12','3','12'], ['21','12','23','12'],
      ['4.22','19.78','5.64','18.36'], ['18.36','5.64','19.78','4.22']
    ];
    sunLines.forEach(function(coords) {
      var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', coords[0]); line.setAttribute('y1', coords[1]);
      line.setAttribute('x2', coords[2]); line.setAttribute('y2', coords[3]);
      icon.appendChild(line);
    });
  } else {
    // Lucide: moon
    icon.textContent = '';
    var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', 'M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z');
    icon.appendChild(path);
  }
});
