<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadena de Palabras — 2º ESO</title>
<link rel="stylesheet" href="../_fonts/fonts.css">
<style>
  :root {
    --bg-primary: #050505;
    --bg-secondary: #0a0a0a;
    --bg-card: #111111;
    --bg-card-hover: #1a1a1a;
    --text-primary: #ffffff;
    --text-secondary: #888888;
    --text-muted: #444444;
    --border: rgba(255,255,255,0.08);
    --accent-1: #00d4aa;
    --accent-2: #00d4ff;
    --accent-3: #f5a623;
    --accent-4: #ff6b6b;
    --accent-5: #a78bfa;
    --accent-6: #4ade80;
    --success: #22c55e;
    --danger: #ef4444;
    --warning: #f59e0b;
  }
  body.light-mode {
    --bg-primary: #f5f5f5;
    --bg-secondary: #e8e8e8;
    --bg-card: #ffffff;
    --bg-card-hover: #f0f0f0;
    --text-primary: #111111;
    --text-secondary: #666666;
    --text-muted: #999999;
    --border: rgba(0,0,0,0.08);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
    overflow-x: hidden;
  }

  /* ── HEADER FIJO ── */
  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    background: var(--bg-primary);
    border-bottom: 1px solid var(--border);
  }
  .home-btn {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    color: var(--text-secondary);
    text-decoration: none;
    transition: color 0.2s;
  }
  .home-btn:hover { color: var(--text-primary); }
  .theme-btn {
    position: absolute;
    right: 16px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    cursor: pointer;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    transition: color 0.2s, border-color 0.2s;
  }
  .theme-btn:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.2); }
  body.light-mode .theme-btn:hover { border-color: rgba(0,0,0,0.2); }

  /* ── MAIN ── */
  .main {
    padding-top: 52px;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── PANTALLAS ── */
  .screen {
    display: none;
    width: 100%;
    max-width: 900px;
    padding: 40px 24px;
    animation: fadeIn 0.3s ease;
  }
  .screen.active { display: flex; flex-direction: column; align-items: center; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── SETUP ── */
  .setup-title {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 900;
    letter-spacing: -0.03em;
    text-align: center;
    margin-bottom: 8px;
  }
  .setup-subtitle {
    color: var(--text-secondary);
    font-size: 1rem;
    text-align: center;
    margin-bottom: 48px;
  }
  .setup-teams {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    width: 100%;
    max-width: 560px;
    margin-bottom: 40px;
  }
  .team-input-wrap {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .team-label {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .team-label.e1 { color: var(--accent-1); }
  .team-label.e2 { color: var(--accent-5); }
  .team-input {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  .team-input:focus { border-color: rgba(255,255,255,0.25); }
  .team-input.e1:focus { border-color: var(--accent-1); }
  .team-input.e2:focus { border-color: var(--accent-5); }
  body.light-mode .team-input { background: var(--bg-card); }

  .btn-primary {
    background: var(--text-primary);
    color: var(--bg-primary);
    border: none;
    border-radius: 12px;
    padding: 14px 40px;
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:active { transform: scale(0.98); }

  /* ── INTRO RONDA ── */
  .round-badge {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }
  .round-title {
    font-size: clamp(2.2rem, 6vw, 4rem);
    font-weight: 900;
    letter-spacing: -0.03em;
    text-align: center;
    margin-bottom: 16px;
  }
  .round-desc {
    color: var(--text-secondary);
    font-size: 1rem;
    text-align: center;
    max-width: 420px;
    line-height: 1.6;
    margin-bottom: 48px;
  }
  .round-desc strong { color: var(--text-primary); }
  .round-timer-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 0.82rem;
    color: var(--text-secondary);
    margin-bottom: 40px;
  }

  /* ── TURNO ── */
  .turn-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    margin-bottom: 32px;
  }
  .turn-team-label {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .turn-team-name {
    font-size: 1.6rem;
    font-weight: 800;
  }
  .turn-team-name.e1 { color: var(--accent-1); }
  .turn-team-name.e2 { color: var(--accent-5); }

  .word-display {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 48px;
    text-align: center;
    margin-bottom: 32px;
    width: 100%;
    max-width: 500px;
  }
  .word-label {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 10px;
  }
  .word-main {
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 900;
    letter-spacing: -0.02em;
  }

  /* Timer círculo */
  .timer-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
  }
  .timer-svg {
    transform: rotate(-90deg);
    filter: drop-shadow(0 0 8px var(--timer-color, var(--accent-2)));
  }
  .timer-circle-bg {
    fill: none;
    stroke: var(--border);
    stroke-width: 4;
  }
  .timer-circle-fg {
    fill: none;
    stroke: var(--timer-color, var(--accent-2));
    stroke-width: 4;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.9s linear, stroke 0.3s;
  }
  .timer-text {
    font-size: 1.5rem;
    font-weight: 800;
    fill: var(--text-primary);
    dominant-baseline: middle;
    text-anchor: middle;
  }

  .answer-wrap {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 500px;
    margin-bottom: 24px;
  }
  .answer-input {
    flex: 1;
    background: var(--bg-card);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    font-family: 'Inter', sans-serif;
    font-size: 1.05rem;
    font-weight: 500;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.2s;
  }
  .answer-input:focus { border-color: rgba(255,255,255,0.3); }
  body.light-mode .answer-input:focus { border-color: rgba(0,0,0,0.3); }
  .answer-input.e1:focus { border-color: var(--accent-1); }
  .answer-input.e2:focus { border-color: var(--accent-5); }
  .btn-send {
    background: var(--text-primary);
    color: var(--bg-primary);
    border: none;
    border-radius: 12px;
    padding: 14px 24px;
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s;
  }
  .btn-send:hover { opacity: 0.85; }

  .hint-text {
    font-size: 0.8rem;
    color: var(--text-muted);
    text-align: center;
  }

  /* ── PROGRESO ── */
  .progress-bar-outer {
    width: 100%;
    max-width: 500px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 32px;
    overflow: hidden;
  }
  .progress-bar-inner {
    height: 100%;
    background: var(--text-secondary);
    border-radius: 2px;
    transition: width 0.3s;
  }

  /* ── TORRES ── */
  .towers-area {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    width: 100%;
    max-width: 700px;
    margin-bottom: 32px;
  }
  .tower-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .tower-team-name {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .tower-score {
    font-size: 2rem;
    font-weight: 900;
  }
  .tower-score.e1 { color: var(--accent-1); }
  .tower-score.e2 { color: var(--accent-5); }
  .tower-stack {
    width: 100%;
    display: flex;
    flex-direction: column-reverse;
    gap: 3px;
    min-height: 200px;
    max-height: 380px;
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: none;
    padding: 4px;
  }
  .tower-stack::-webkit-scrollbar { display: none; }

  .block {
    width: 100%;
    height: 52px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.78rem;
    font-weight: 600;
    color: #fff;
    text-align: center;
    padding: 4px 8px;
    animation: blockSlideUp 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    flex-shrink: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .block.e1 { background: var(--accent-1); color: #050505; }
  .block.e2 { background: var(--accent-5); }
  .block.fail {
    background: var(--danger);
    animation: blockFail 0.6s ease forwards;
    height: 28px;
  }

  @keyframes blockSlideUp {
    from { opacity: 0; transform: translateY(20px) scale(0.9); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes blockFail {
    0%   { opacity: 1; transform: translateX(0);    height: 28px; }
    15%  { transform: translateX(-6px); }
    30%  { transform: translateX(6px); }
    45%  { transform: translateX(-4px); }
    60%  { transform: translateX(4px); }
    75%  { transform: translateX(-2px); opacity: 0.6; }
    100% { transform: translateX(0); opacity: 0; height: 0; padding: 0; margin: 0; }
  }

  /* ── FEEDBACK ── */
  .feedback-overlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    pointer-events: none;
  }
  .feedback-pill {
    padding: 16px 36px;
    border-radius: 100px;
    font-size: 1.3rem;
    font-weight: 800;
    letter-spacing: -0.01em;
    animation: pillPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    pointer-events: none;
  }
  .feedback-pill.correct { background: var(--success); color: #fff; }
  .feedback-pill.wrong { background: var(--danger); color: #fff; }
  .feedback-pill.timeout { background: var(--warning); color: #050505; }
  .feedback-pill.fade-out { animation: pillFade 0.3s ease forwards; }

  @keyframes pillPop {
    from { opacity: 0; transform: scale(0.7); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes pillFade {
    from { opacity: 1; transform: scale(1); }
    to { opacity: 0; transform: scale(0.9); }
  }

  /* ── RESULTADO ── */
  .result-title {
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 900;
    letter-spacing: -0.03em;
    text-align: center;
    margin-bottom: 8px;
  }
  .result-winner {
    font-size: 1.1rem;
    color: var(--text-secondary);
    text-align: center;
    margin-bottom: 40px;
  }
  .result-winner strong { color: var(--text-primary); }
  .btn-secondary {
    background: var(--bg-card);
    color: var(--text-primary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 13px 32px;
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    margin-top: 16px;
  }
  .btn-secondary:hover { background: var(--bg-card-hover); border-color: rgba(255,255,255,0.18); }
  body.light-mode .btn-secondary:hover { border-color: rgba(0,0,0,0.18); }

  /* ── LIVE SCORES DURING TURN ── */
  .live-scores {
    display: flex;
    gap: 40px;
    margin-bottom: 20px;
  }
  .live-score-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .live-score-label {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }
  .live-score-val {
    font-size: 1.6rem;
    font-weight: 900;
  }
  .live-score-val.e1 { color: var(--accent-1); }
  .live-score-val.e2 { color: var(--accent-5); }

  /* ── ROUND DOTS ── */
  .round-dots {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  .round-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.3s;
  }
  .round-dot.done { background: var(--text-secondary); }
  .round-dot.active { background: var(--text-primary); }

  /* Scrollbar en torres grande */
  .towers-area-result {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    width: 100%;
    max-width: 700px;
    margin-bottom: 32px;
  }
  .tower-stack-result {
    width: 100%;
    display: flex;
    flex-direction: column-reverse;
    gap: 3px;
    max-height: 420px;
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
    padding: 4px;
  }

  @media (max-width: 600px) {
    .setup-teams { grid-template-columns: 1fr; }
    .towers-area, .towers-area-result { gap: 12px; }
    .word-display { padding: 24px 20px; }
    .answer-wrap { flex-direction: column; }
  }

  /* Controles de partida */
  .game-controls-bar {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 0.75rem;
  }
  .btn-game-ctrl {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.9rem;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      background: rgba(255,255,255,0.05);
      color: var(--text-secondary);
      font-size: 0.78rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
  }
  .btn-game-ctrl:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }
  .btn-game-ctrl svg { width: 14px; height: 14px; }
  .btn-game-ctrl.danger { border-color: rgba(239,68,68,0.3); }
  .btn-game-ctrl.danger:hover { background: rgba(239,68,68,0.15); color: var(--danger); }

  /* Overlay de pausa */
  .pause-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
  }
  .pause-overlay.visible { display: flex; }
  .pause-title { font-size: 1.5rem; font-weight: 700; color: var(--text-primary); }
  .pause-actions { display: flex; gap: 1rem; }
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <a href="/" class="home-btn" title="Volver a adri-app">
    <svg viewBox="0 0 100 100" width="28" height="28">
      <polygon points="50,5 95,82 5,82" fill="currentColor"/>
      <line x1="50" y1="56" x2="50" y2="5" stroke="var(--bg-primary)" stroke-width="4"/>
      <line x1="50" y1="56" x2="95" y2="82" stroke="var(--bg-primary)" stroke-width="4"/>
      <line x1="50" y1="56" x2="5" y2="82" stroke="var(--bg-primary)" stroke-width="4"/>
    </svg>
  </a>
  <button class="theme-btn" id="themeBtn" title="Cambiar tema">
    <svg id="iconMoon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
    <svg id="iconSun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/>
      <line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/>
      <line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
  </button>
</header>

<div class="main">

  <!-- FEEDBACK OVERLAY -->
  <div class="feedback-overlay" id="feedbackOverlay"></div>

  <!-- ────── PANTALLA 1: SETUP ────── -->
  <section class="screen active" id="screenSetup">
    <p class="round-badge">Lengua Castellana · 2º ESO</p>
    <h1 class="setup-title">Cadena de<br>Palabras</h1>
    <p class="setup-subtitle">Sinónimos · Antónimos · Familia léxica · Campo semántico</p>

    <div class="setup-teams">
      <div class="team-input-wrap">
        <label class="team-label e1">Equipo 1</label>
        <input class="team-input e1" id="nameE1" type="text" placeholder="Equipo Verde" maxlength="20">
      </div>
      <div class="team-input-wrap">
        <label class="team-label e2">Equipo 2</label>
        <input class="team-input e2" id="nameE2" type="text" placeholder="Equipo Violeta" maxlength="20">
      </div>
    </div>
    <button class="btn-primary" id="btnStart">Comenzar</button>
  </section>

  <!-- ────── PANTALLA 2: INTRO RONDA ────── -->
  <section class="screen" id="screenRoundIntro">
    <p class="round-badge" id="introBadge">Ronda 1 de 4</p>
    <h2 class="round-title" id="introTitle">Sinónimos</h2>
    <div class="round-timer-badge" id="introTimerBadge">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span id="introTimerText">10 segundos por turno</span>
    </div>
    <p class="round-desc" id="introDesc"></p>
    <div class="round-dots" id="roundDots"></div>
    <button class="btn-primary" id="btnGo">¡Adelante!</button>
  </section>

  <!-- ────── PANTALLA 3: TURNO ────── -->
  <section class="screen" id="screenTurn">
    <div class="game-controls-bar">
        <button class="btn-game-ctrl" id="btnPauseCadena" onclick="togglePausaCadena()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            Pausa
        </button>
        <button class="btn-game-ctrl danger" onclick="confirmarStopCadena()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
            Reiniciar
        </button>
    </div>

    <div class="live-scores">
      <div class="live-score-item">
        <span class="live-score-label" id="liveLabel1">E1</span>
        <span class="live-score-val e1" id="liveScore1">0</span>

// ════════════════════════════════════════════
//  NORMALIZACIÓN
// ════════════════════════════════════════════
function normalize(str) {
  return str
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/\s+/g, " ");
}

// ════════════════════════════════════════════
//  SELECCIÓN DE ITEM ALEATORIO SIN REPETIR
// ════════════════════════════════════════════
function pickItem(roundIdx) {
  const cfg = ROUNDS_CONFIG[roundIdx];
  const pool = cfg.datos;
  const used = state.usedIndices[roundIdx];
  const available = pool.map((_, i) => i).filter(i => !used.includes(i));
  if (available.length === 0) {
    // reiniciar si agotamos el banco
    state.usedIndices[roundIdx] = [];
    return pickItem(roundIdx);
  }
  const idx = available[Math.floor(Math.random() * available.length)];
  state.usedIndices[roundIdx].push(idx);
  return pool[idx];
}

function startGame() {
  const n1 = document.getElementById('nameE1').value.trim() || 'Equipo Verde';
  const n2 = document.getElementById('nameE2').value.trim() || 'Equipo Violeta';
  state.names = [n1, n2];

  state.blocks = [[], []];
  state.currentRound = 0;
  state.currentTurn = 0;
  state.usedIndices = [[], [], [], []];
  state.locked = false;

  // Limpiar torres live
  document.getElementById('towerStack1').innerHTML = '';
  document.getElementById('towerStack2').innerHTML = '';

  // Actualizar nombres live
  document.getElementById('towerName1').textContent = n1;

  document.getElementById('liveLabel2').textContent = n2;

  showRoundIntro();
}

function showRoundIntro() {
  const cfg = ROUNDS_CONFIG[state.currentRound];
  document.getElementById('introBadge').textContent = `Ronda ${cfg.id} de ${ROUNDS_CONFIG.length}`;
  document.getElementById('introTitle').textContent = cfg.nombre;
  document.getElementById('introTimerText').textContent = `${cfg.tiempo} segundos por turno`;
  document.getElementById('introDesc').innerHTML = cfg.desc;

  // Dots
  const dotsEl = document.getElementById('roundDots');
  dotsEl.innerHTML = '';
  ROUNDS_CONFIG.forEach((r, i) => {
    const d = document.createElement('div');
    d.className = 'round-dot';
    if (i < state.currentRound) d.classList.add('done');
    if (i === state.currentRound) d.classList.add('active');
    dotsEl.appendChild(d);
  });

  showScreen('screenRoundIntro');
}

document.getElementById('btnGo').addEventListener('click', () => {
  state.currentTurn = 0;
  showTurn();
});

// ════════════════════════════════════════════
function currentTeamIdx() {
  // Alternar E1, E2, E1, E2, E1, E2 → turn 0,2,4 = E1; turn 1,3,5 = E2
  return state.currentTurn % 2;
}

function showTurn() {
  stopTimer();
  state.locked = false;

  const cfg = ROUNDS_CONFIG[state.currentRound];
  const teamIdx = currentTeamIdx();

  // Actualizar live scores
  document.getElementById('liveScore1').textContent = state.scores[0];
  document.getElementById('liveScore2').textContent = state.scores[1];

  // Header de turno
  document.getElementById('turnRoundLabel').textContent = `Ronda ${cfg.id} — ${cfg.nombre}`;
  const nameEl = document.getElementById('turnTeamName');
  nameEl.textContent = state.names[teamIdx];
  nameEl.className = 'turn-team-name ' + (teamIdx === 0 ? 'e1' : 'e2');

  // Progreso
  const totalTurns = TURNS_PER_ROUND * 2;
  document.getElementById('progressBar').style.width = `${(state.currentTurn / totalTurns) * 100}%`;

  // Item
  state.currentItem = pickItem(state.currentRound);

  // Palabra / campo
  const displayKey = cfg.tipo === 'single'
    ? state.currentItem.palabra.toUpperCase()
    : (state.currentItem.raiz || state.currentItem.campo);
  document.getElementById('wordLabel').textContent = cfg.wordLabel;
  document.getElementById('wordMain').textContent = displayKey;

  // Hint
  document.getElementById('hintText').textContent = cfg.hint;

  // Input
  const inputEl = document.getElementById('answerInput');
  const inputClass = teamIdx === 0 ? 'e1' : 'e2';
  inputEl.value = '';
  inputEl.className = `answer-input ${inputClass}`;
  inputEl.disabled = false;
  inputEl.focus();

  showScreen('screenTurn');
  startTimer(cfg.tiempo);
}

  state.timerInterval = setInterval(() => {
    state.timerLeft--;
    updateTimerUI(state.timerLeft, state.timerTotal);
    if (state.timerLeft <= 0) {
      stopTimer();
      handleTimeout();
    }
  }, 1000);
}

function stopTimer() {
  if (state.timerInterval) {
    clearInterval(state.timerInterval);
    state.timerInterval = null;
  }
}

function updateTimerUI(left, total) {
  const ratio = left / total;
  const offset = CIRCUMFERENCE * (1 - ratio);
  const circle = document.getElementById('timerCircle');
  const text = document.getElementById('timerText');

  circle.style.strokeDashoffset = offset;

  // Color: verde → naranja → rojo
  let color;
  if (ratio > 0.5) color = 'var(--accent-1)';
  else if (ratio > 0.25) color = 'var(--warning)';
  else color = 'var(--danger)';

  circle.style.stroke = color;
  // actualizar drop-shadow de svg
  document.querySelector('.timer-svg').style.filter = `drop-shadow(0 0 8px ${ratio > 0.5 ? '#00d4aa' : ratio > 0.25 ? '#f59e0b' : '#ef4444'})`;

  text.textContent = left;
  // Actualizar el texto dentro del SVG directamente
  text.style.fill = 'var(--text-primary)';
}

// ════════════════════════════════════════════
//  VALIDACIÓN
// ════════════════════════════════════════════
function validate(answer) {
  const cfg = ROUNDS_CONFIG[state.currentRound];
  const item = state.currentItem;

  if (cfg.tipo === 'single') {
    const norm = normalize(answer);
    if (!norm) return { ok: false, points: 0, label: '—' };
    const match = item.validos.some(v => normalize(v) === norm);
    return { ok: match, points: match ? 1 : 0, label: norm };
  } else {
    // multi: dividir por comas, evaluar cada una
    const parts = answer.split(',').map(s => normalize(s)).filter(s => s.length > 0);
    if (parts.length === 0) return { ok: false, points: 0, label: '—' };
    const validNorms = item.validos.map(v => normalize(v));
    let hits = 0;
    const hitWords = [];
    const seen = new Set();
    for (const p of parts) {
      if (!seen.has(p) && validNorms.includes(p)) {
        hits++;
        hitWords.push(p);
        seen.add(p);
        if (hits >= 3) break;
      }
    }
    return {
      ok: hits > 0,
      points: hits,
      label: hitWords.length > 0 ? hitWords.join(', ') : (parts[0] || '—'),
    };
  }
}

// ════════════════════════════════════════════
//  ENVIAR RESPUESTA
// ════════════════════════════════════════════
document.getElementById('btnSend').addEventListener('click', submitAnswer);
document.getElementById('answerInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitAnswer();
});

function submitAnswer() {
  if (state.locked) return;
  const answer = document.getElementById('answerInput').value;
  processAnswer(answer);
}

function handleTimeout() {
  if (state.locked) return;
  processAnswer('', true);
}

function processAnswer(answer, timedOut = false) {
  state.locked = true;
  stopTimer();
  document.getElementById('answerInput').disabled = true;

  const teamIdx = currentTeamIdx();
  let result;

  if (timedOut || !answer.trim()) {
    result = { ok: false, points: 0, label: '—' };
  } else {
    result = validate(answer);
  }

  // Actualizar puntuación
  state.scores[teamIdx] += result.points;

  // Añadir bloque a la torre
  addBlock(teamIdx, result.ok, result.points, result.label, timedOut);

  // Feedback visual
  let msg, cls;
  if (timedOut) {
    msg = '⏱ Tiempo agotado'; cls = 'timeout';
  } else if (result.ok) {
    msg = result.points > 1 ? `+${result.points} puntos` : 'Correcto';
    cls = 'correct';
  } else {
    msg = 'Incorrecto';
    cls = 'wrong';
  }
  showFeedback(msg, cls);

  // Avanzar tras 2s
  setTimeout(() => {
    hideFeedback();
    advanceTurn();
  }, 1800);
}

function advanceTurn() {
  state.currentTurn++;
  const totalTurns = TURNS_PER_ROUND * 2; // 6 turnos por ronda

  if (state.currentTurn >= totalTurns) {
    // Ronda terminada
    state.currentRound++;
    if (state.currentRound >= ROUNDS_CONFIG.length) {
      showResult();
    } else {
      showRoundIntro();
    }
  } else {
    showTurn();
  }
}

// ════════════════════════════════════════════
//  TORRES
// ════════════════════════════════════════════
function addBlock(teamIdx, ok, points, label, timedOut) {
  const stackEl = document.getElementById(`towerStack${teamIdx + 1}`);
  const block = document.createElement('div');

  if (ok) {
    block.className = `block ${teamIdx === 0 ? 'e1' : 'e2'}`;
    block.textContent = label.length > 18 ? label.slice(0, 17) + '…' : label;
    state.blocks[teamIdx].push({ ok: true, label, points });
  } else {
    block.className = 'block fail';
    block.textContent = timedOut ? 'tiempo' : '✗';
    state.blocks[teamIdx].push({ ok: false, label: timedOut ? 'tiempo' : '✗', points: 0 });
    // El bloque de fallo desaparece tras la animación
    setTimeout(() => {
      block.style.height = '0';
      block.style.padding = '0';
      block.style.margin = '0';
      block.style.opacity = '0';
    }, 600);
  }

  stackEl.appendChild(block);
  // Hacer scroll al último bloque
  stackEl.scrollTop = stackEl.scrollHeight;
}

// ════════════════════════════════════════════
//  FEEDBACK PILL
// ════════════════════════════════════════════
function showFeedback(msg, cls) {
  const overlay = document.getElementById('feedbackOverlay');
  overlay.innerHTML = `<div class="feedback-pill ${cls}">${msg}</div>`;
}

function hideFeedback() {
  const overlay = document.getElementById('feedbackOverlay');
  const pill = overlay.querySelector('.feedback-pill');
  if (pill) {
    pill.classList.add('fade-out');
    setTimeout(() => { overlay.innerHTML = ''; }, 300);
  }
}

// ════════════════════════════════════════════
//  RESULTADO FINAL
// ════════════════════════════════════════════
function showResult() {
  const s0 = state.scores[0];
  const s1 = state.scores[1];

  let winnerText;
  if (s0 > s1) winnerText = `Gana <strong>${state.names[0]}</strong> con ${s0} punto${s0 !== 1 ? 's' : ''}`;
  else if (s1 > s0) winnerText = `Gana <strong>${state.names[1]}</strong> con ${s1} punto${s1 !== 1 ? 's' : ''}`;
  else winnerText = `Empate a <strong>${s0} punto${s0 !== 1 ? 's' : ''}</strong>`;

  document.getElementById('resultWinner').innerHTML = winnerText;
  document.getElementById('resTowerName1').textContent = state.names[0];
  document.getElementById('resTowerName2').textContent = state.names[1];
  document.getElementById('resTowerScore1').textContent = s0;
  document.getElementById('resTowerScore2').textContent = s1;

  // Reconstruir torres en pantalla de resultado
  ['1', '2'].forEach(idx => {
    const stack = document.getElementById(`resTowerStack${idx}`);
    stack.innerHTML = '';
    const teamIdx = parseInt(idx) - 1;
    state.blocks[teamIdx].forEach(b => {
      if (!b.ok) return; // no mostrar fallos en resultado
      const el = document.createElement('div');
      el.className = `block ${teamIdx === 0 ? 'e1' : 'e2'}`;
      el.style.animation = 'none';
      el.textContent = b.label.length > 18 ? b.label.slice(0, 17) + '…' : b.label;
      stack.appendChild(el);
    });
  });

  showScreen('screenResult');
}

// ════════════════════════════════════════════
//  PAUSA / STOP
// ════════════════════════════════════════════

// SVG estáticos para el botón de pausa (construidos con DOM para evitar innerHTML)
function svgPausa() {
  const s = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  s.setAttribute('viewBox', '0 0 24 24');
  s.setAttribute('fill', 'none');
  s.setAttribute('stroke', 'currentColor');
  s.setAttribute('stroke-width', '2');
  const r1 = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  r1.setAttribute('x', '6'); r1.setAttribute('y', '4');
  r1.setAttribute('width', '4'); r1.setAttribute('height', '16');
  const r2 = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  r2.setAttribute('x', '14'); r2.setAttribute('y', '4');
  r2.setAttribute('width', '4'); r2.setAttribute('height', '16');
  s.appendChild(r1); s.appendChild(r2);
  return s;
}

function svgPlay() {
  const s = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  s.setAttribute('viewBox', '0 0 24 24');
  s.setAttribute('fill', 'none');
  s.setAttribute('stroke', 'currentColor');
  s.setAttribute('stroke-width', '2');
  const p = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
  p.setAttribute('points', '5 3 19 12 5 21 5 3');
  s.appendChild(p);
  return s;
}

function setBtnPausaUI(pausado) {
  const btn = document.getElementById('btnPauseCadena');
  if (!btn) return;
  btn.textContent = '';
  btn.appendChild(pausado ? svgPlay() : svgPausa());
  btn.appendChild(document.createTextNode(pausado ? ' Continuar' : ' Pausa'));
}

function togglePausaCadena() {
  if (state.pausado) {
    reanudarCadena();
  } else {
    pausarCadena();
  }
}

function pausarCadena() {
  if (state.pausado) return;
  state.pausado = true;
  stopTimer();
  setBtnPausaUI(true);
  document.getElementById('pauseOverlayCadena').classList.add('visible');
}

function reanudarCadena() {
  if (!state.pausado) return;
  state.pausado = false;
  document.getElementById('pauseOverlayCadena').classList.remove('visible');
  setBtnPausaUI(false);
  // Reanudar con el tiempo que quedaba
  startTimer(state.timerLeft);
}

function confirmarStopCadena() {
  if (confirm('¿Reiniciar la partida?')) {
    stopCadena();
  }
}

function stopCadena() {
  stopTimer();
  state.pausado = false;
  document.getElementById('pauseOverlayCadena').classList.remove('visible');
  setBtnPausaUI(false);
  showScreen('screenSetup');
}

// ════════════════════════════════════════════
//  NUEVA PARTIDA
// ════════════════════════════════════════════
document.getElementById('btnNewGame').addEventListener('click', () => {
  showScreen('screenSetup');
});

</script>
