<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tetris Gramatical — 2º ESO</title>
<link rel="stylesheet" href="../_fonts/fonts.css">
<style>
:root {
    --bg-primary: #050505;
    --bg-secondary: #0a0a0a;
    --bg-card: #111111;
    --bg-card-hover: #1a1a1a;
    --text-primary: #ffffff;
    --text-secondary: #888888;
    --text-muted: #444444;
    --border: rgba(255,255,255,0.08);
    --accent-1: #00d4aa;
    --accent-2: #00d4ff;
    --accent-3: #f5a623;
    --accent-4: #ff6b6b;
    --accent-5: #a78bfa;
    --accent-6: #4ade80;
    --success: #22c55e;
    --danger: #ef4444;
    --warning: #f59e0b;
}
body.light-mode {
    --bg-primary: #f5f5f5;
    --bg-secondary: #e8e8e8;
    --bg-card: #ffffff;
    --bg-card-hover: #f0f0f0;
    --text-primary: #111111;
    --text-secondary: #666666;
    --text-muted: #999999;
    --border: rgba(0,0,0,0.08);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: background 0.3s, color 0.3s;
    overflow: hidden;
}

/* ── NAV BAR ── */
.nav-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    z-index: 100;
}
.nav-home {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    transition: color 0.2s;
}
.nav-home:hover { color: var(--text-primary); }
.nav-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.05em;
    text-transform: uppercase;
}
.btn-theme {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text-secondary);
    transition: border-color 0.2s, color 0.2s;
}
.btn-theme:hover { border-color: var(--accent-1); color: var(--accent-1); }

/* ── SCREENS ── */
.screen {
    display: none;
    width: 100%;
    max-width: 860px;
    padding: 72px 24px 24px;
    min-height: 100vh;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
}
.screen.active { display: flex; }

/* ── SETUP SCREEN ── */
.setup-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    gap: 28px;
}
.setup-title {
    font-size: 32px;
    font-weight: 900;
    text-align: center;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}
.setup-subtitle {
    text-align: center;
    color: var(--text-secondary);
    font-size: 14px;
    margin-top: 6px;
}
.field-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
}
.field-label {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-secondary);
}
/* ── LISTA DE PARTICIPANTES ── */
.field-label-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.btn-add-player {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 10px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent-1);
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
}
.btn-add-player:hover { border-color: var(--accent-1); background: rgba(0,212,170,0.08); }
.participants-list { display: flex; flex-direction: column; gap: 8px; }
.participant-row {
    display: flex;
    align-items: center;
    gap: 8px;
}
.participant-row .p-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
}
.participant-row input { flex: 1; }
.btn-remove-player {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    color: var(--text-muted);
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    flex-shrink: 0;
}
.btn-remove-player:hover { border-color: var(--danger); color: var(--danger); }
input[type="text"] {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
}
input[type="text"]:focus { border-color: var(--accent-1); }
.difficulty-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}
.diff-btn {
    background: var(--bg-secondary);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 14px 8px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    transition: border-color 0.2s, background 0.2s;
    color: var(--text-primary);
}
.diff-btn .diff-name {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-primary);
}
.diff-btn .diff-cats {
    font-size: 11px;
    color: var(--text-secondary);
    text-align: center;
    line-height: 1.4;
}
.diff-btn.selected {
    border-color: var(--accent-1);
    background: rgba(0,212,170,0.08);
}
.diff-btn:hover:not(.selected) { border-color: rgba(255,255,255,0.2); }
.btn-start {
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    border: none;
    border-radius: 14px;
    padding: 16px;
    color: #000;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.03em;
}
.btn-start:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-start:active { transform: translateY(0); }

/* ── PRE-NIVEL SCREEN ── */
.prenivel-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 52px 40px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    max-width: 480px;
    width: 100%;
}
.prenivel-nivel {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--text-secondary);
}
.prenivel-big {
    font-size: 56px;
    font-weight: 900;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}
.prenivel-info {
    display: flex;
    gap: 20px;
}
.prenivel-badge {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    text-align: center;
}
.prenivel-badge span {
    display: block;
    font-size: 16px;
    font-weight: 800;
    color: var(--text-primary);
    margin-top: 2px;
}
.btn-listo {
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    border: none;
    border-radius: 14px;
    padding: 14px 40px;
    color: #000;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 8px;
}
.btn-listo:hover { opacity: 0.9; }

/* ── GAME SCREEN ── */
#screen-game {
    padding: 56px 16px 16px;
    justify-content: flex-start;
    gap: 12px;
    max-width: 100%;
}

.game-scoreboard {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    width: 100%;
    max-width: 700px;
}
.score-team {
    flex: 1;
    min-width: 120px;
    background: var(--bg-card);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: border-color 0.3s;
}
.score-team.active-team { border-color: var(--current-color); }
.score-team .team-indicator {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--current-color);
    flex-shrink: 0;
}
.score-team .team-info { flex: 1; }
.score-team .team-name {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-secondary);
}
.score-team .team-score {
    font-size: 28px;
    font-weight: 900;
    line-height: 1;
    color: var(--text-primary);
}
.score-team .powerup-flag {
    font-size: 18px;
    display: none;
}
.score-team.has-x2 .powerup-flag { display: block; }

.game-progress-bar {
    width: 100%;
    max-width: 700px;
    height: 6px;
    background: var(--bg-card);
    border-radius: 3px;
    overflow: hidden;
}
.game-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
    border-radius: 3px;
    transition: width 0.1s linear;
    width: 100%;
}

.game-status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 700px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
}
.status-nivel { }
.status-turno { color: var(--text-secondary); }
.status-palabra-num { }

/* ── ZONA DE CAÍDA ── */
.fall-zone {
    width: 100%;
    max-width: 700px;
    flex: 1;
    min-height: 300px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    position: relative;
    overflow: hidden;
}

.fall-zone-grid {
    position: absolute;
    inset: 0;
    display: flex;
}
.fall-lane {
    flex: 1;
    border-right: 1px solid var(--border);
    opacity: 0.3;
}
.fall-lane:last-child { border-right: none; }

.falling-word {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-card-hover);
    border: 2px solid var(--word-color, var(--accent-1));
    border-radius: 12px;
    padding: 10px 22px;
    font-size: 22px;
    font-weight: 800;
    color: var(--text-primary);
    white-space: nowrap;
    z-index: 10;
    box-shadow: 0 0 20px var(--word-glow, rgba(0,212,170,0.3));
    user-select: none;
}

@keyframes caer {
    from { top: -70px; }
    to   { top: calc(100% - 10px); }
}

.falling-word.cayendo {
    animation: caer linear forwards;
}

/* Animación acierto: deslizar hacia abajo y desaparecer */
@keyframes acierto-anim {
    0%   { transform: translateX(-50%) scale(1); opacity: 1; }
    40%  { transform: translateX(-50%) scale(1.15); opacity: 1; }
    100% { transform: translateX(-50%) scale(0.7) translateY(60px); opacity: 0; }
}
.falling-word.acierto {
    animation: acierto-anim 0.5s ease forwards !important;
    border-color: var(--success) !important;
    box-shadow: 0 0 30px rgba(34,197,94,0.6) !important;
}

/* Animación fallo: romper */
@keyframes fallo-anim {
    0%   { transform: translateX(-50%) scale(1) rotate(0deg); opacity: 1; }
    30%  { transform: translateX(-50%) scale(1.1) rotate(-8deg); opacity: 0.8; }
    100% { transform: translateX(-50%) scale(0) rotate(35deg); opacity: 0; }
}
.falling-word.fallo {
    animation: fallo-anim 0.5s ease forwards !important;
    border-color: var(--danger) !important;
    box-shadow: 0 0 30px rgba(239,68,68,0.6) !important;
}

/* Flash en zona */
@keyframes flash-verde {
    0%, 100% { background: var(--bg-card); }
    50% { background: rgba(34,197,94,0.12); }
}
@keyframes flash-rojo {
    0%, 100% { background: var(--bg-card); }
    50% { background: rgba(239,68,68,0.12); }
}
.fall-zone.flash-acierto { animation: flash-verde 0.4s ease; }
.fall-zone.flash-fallo   { animation: flash-rojo 0.4s ease; }

/* Power-up flotante en zona */
.powerup-notice {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--bg-secondary);
    border: 2px solid var(--accent-3);
    border-radius: 14px;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 15px;
    font-weight: 700;
    color: var(--accent-3);
    z-index: 20;
    pointer-events: none;
    opacity: 0;
}
@keyframes powerup-show {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.7); }
    20%  { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
    80%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
}
.powerup-notice.show {
    animation: powerup-show 2.5s ease forwards;
}
.powerup-notice svg { width: 22px; height: 22px; }

/* Power-up activo badge */
.powerup-active-badge {
    position: absolute;
    top: 10px;
    right: 12px;
    background: rgba(245,166,35,0.15);
    border: 1px solid var(--accent-3);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent-3);
    display: flex;
    align-items: center;
    gap: 5px;
    z-index: 15;
}

/* ── COLUMNAS ── */
.columns-area {
    width: 100%;
    max-width: 700px;
    display: flex;
    gap: 8px;
}

.col-btn {
    flex: 1;
    background: var(--bg-card);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 20px 8px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    position: relative;
    overflow: hidden;
    min-width: 0;
}
.col-btn:hover {
    background: rgba(255,255,255,0.06);
    border-color: var(--col-color);
    transform: translateY(-2px);
}
.col-btn:active {
    transform: translateY(0) scale(0.97);
}
.col-btn .col-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--col-color);
    flex-shrink: 0;
    box-shadow: 0 0 8px var(--col-color);
}
.col-btn .col-name {
    font-size: 13px;
    font-weight: 700;
    text-align: center;
    line-height: 1.2;
    color: var(--col-color);
    text-transform: uppercase;
    letter-spacing: 0.04em;
}


/* Barra de controles de juego */
.game-controls {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    margin-bottom: 0.75rem;
}
.btn-game-ctrl {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.35rem 0.9rem;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    background: rgba(255,255,255,0.05);
    color: var(--text-secondary);
    font-size: 0.78rem;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
}
.btn-game-ctrl:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }
.btn-game-ctrl svg { width: 14px; height: 14px; }
.btn-game-ctrl.danger { border-color: rgba(239,68,68,0.3); }
.btn-game-ctrl.danger:hover { background: rgba(239,68,68,0.15); color: var(--danger); }

/* Overlay de pausa */
.pause-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.75);
    border-radius: 12px;
    z-index: 50;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
}
.pause-overlay.visible { display: flex; }
.pause-title {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text-primary);
}
.pause-actions { display: flex; gap: 1rem; }

/* Flash de columna */
@keyframes col-flash-ok {
    0%, 100% { background: var(--bg-card); }
    50% { background: rgba(34,197,94,0.2); border-color: var(--success); }
}
@keyframes col-flash-err {
    0%, 100% { background: var(--bg-card); }
    50% { background: rgba(239,68,68,0.2); border-color: var(--danger); }
}
@keyframes col-glow-hint {
    0%, 100% { box-shadow: none; }
    50% { box-shadow: 0 0 24px var(--col-color); border-color: var(--col-color); }
}
.col-btn.flash-ok  { animation: col-flash-ok 0.4s ease; }
.col-btn.flash-err { animation: col-flash-err 0.4s ease; }
.col-btn.hint-glow { animation: col-glow-hint 1s ease; }

/* Feedback float */
.feedback-float {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px;
    font-weight: 900;
    pointer-events: none;
    z-index: 200;
    opacity: 0;
}
@keyframes feedback-rise {
    0%   { opacity: 1; transform: translate(-50%, -50%) scale(0.8); }
    50%  { opacity: 1; transform: translate(-50%, calc(-50% - 30px)) scale(1.1); }
    100% { opacity: 0; transform: translate(-50%, calc(-50% - 70px)) scale(1); }
}
.feedback-float.show {
    animation: feedback-rise 0.8s ease forwards;
}

/* Puntos float */
.points-float {
    position: absolute;
    font-size: 18px;
    font-weight: 900;
    pointer-events: none;
    z-index: 201;
    opacity: 0;
    left: 50%;
}
@keyframes points-rise {
    0%   { opacity: 1; transform: translateX(-50%) translateY(0); }
    100% { opacity: 0; transform: translateX(-50%) translateY(-50px); }
}
.points-float.show {
    animation: points-rise 0.9s ease forwards;
}

/* ── ENTRE TURNOS ── */
.entreturnos-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 44px;
    text-align: center;
    max-width: 440px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
}
.et-title {
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-secondary);
}
.et-scores {
    display: flex;
    gap: 24px;
    justify-content: center;
}
.et-score-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
}
.et-score-block .et-team-name {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--text-secondary);
}
.et-score-block .et-team-score {
    font-size: 44px;
    font-weight: 900;
    line-height: 1;
}
.et-vs { font-size: 16px; font-weight: 700; color: var(--text-muted); align-self: center; }
.et-next-info {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.5;
}
.btn-siguiente {
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    border: none;
    border-radius: 12px;
    padding: 13px 32px;
    color: #000;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    transition: opacity 0.2s;
}
.btn-siguiente:hover { opacity: 0.9; }

/* ── RESULTADOS ── */
.resultado-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 52px 40px;
    text-align: center;
    max-width: 500px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
}
.resultado-trophy {
    font-size: 64px;
    line-height: 1;
}
.resultado-ganador-label {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-secondary);
}
.resultado-ganador-name {
    font-size: 40px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent-3), var(--accent-1));

// Paleta de colores para hasta 8 participantes
const PALETA = ['#00d4aa','#a78bfa','#f5a623','#00d4ff','#ff6b6b','#4ade80','#f472b6','#facc15'];

// ═══════════════════════════════════════════════════════
// GESTIÓN DE PARTICIPANTES EN SETUP
// ═══════════════════════════════════════════════════════
let numParticipantes = 2;
const MAX_PARTICIPANTES = 8;

function renderParticipantes() {
    const lista = document.getElementById('participantsList');
    lista.innerHTML = '';
    for (let i = 0; i < numParticipantes; i++) {
        const row = document.createElement('div');
        row.className = 'participant-row';
        row.dataset.idx = i;

        const dot = document.createElement('span');
        dot.className = 'p-dot';
        dot.style.background = PALETA[i];

        const inp = document.createElement('input');
        inp.type = 'text';
        inp.maxLength = 20;
        inp.placeholder = numParticipantes === 1 ? 'Jugador' : `Participante ${i + 1}`;
        inp.id = `pName_${i}`;

        const btnRem = document.createElement('button');
        btnRem.className = 'btn-remove-player';
        btnRem.textContent = '×';
        btnRem.title = 'Eliminar';
        btnRem.style.display = numParticipantes <= 1 ? 'none' : '';
        btnRem.addEventListener('click', () => {
            numParticipantes = Math.max(1, numParticipantes - 1);
            renderParticipantes();
        });

        row.appendChild(dot);
        row.appendChild(inp);
        row.appendChild(btnRem);
        lista.appendChild(row);
    }
    // Ocultar botón añadir si se llega al máximo
    document.getElementById('btnAddPlayer').style.display =
        numParticipantes >= MAX_PARTICIPANTES ? 'none' : '';
}

document.getElementById('btnAddPlayer').addEventListener('click', () => {

function aleatorio(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
}
function shuffled(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

document.getElementById('btnStart').addEventListener('click', () => {

    const nombres = [];
    for (let i = 0; i < numParticipantes; i++) {
        const val = (document.getElementById(`pName_${i}`)?.value || '').trim();
        nombres.push(val || (numParticipantes === 1 ? 'Jugador' : `P${i + 1}`));
    }
    estado.equipos  = nombres;
    estado.colores  = nombres.map((_, i) => PALETA[i % PALETA.length]);
    estado.puntos   = nombres.map(() => 0);

    estado.turnoActual = 0;
    estado.palabraEnNivel = 0;
    estado.palabrasTotales = 0;
    estado.palabrasUsadas = new Set();

});

function mostrarPreNivel() {
    const vel = VELOCIDADES[estado.nivel];
    document.getElementById('pn-nivel-label').textContent = `NIVEL ${estado.nivel}`;
    document.getElementById('pn-big').textContent = `Nivel ${estado.nivel}`;
    document.getElementById('pn-velocidad').textContent = `${(vel/1000).toFixed(1)}s`;

    const turnoBadge = document.getElementById('pn-turno-badge');
    if (estado.equipos.length <= 1) {
        turnoBadge.style.display = 'none';
    } else {
        turnoBadge.style.display = '';
        const pnTurno = document.getElementById('pn-turno-equipo');
        pnTurno.textContent = estado.equipos[estado.turnoActual];
        pnTurno.style.color = estado.colores[estado.turnoActual];
    }
    showScreen('screen-prenivel');
}

document.getElementById('btnListo').addEventListener('click', () => {

// ═══════════════════════════════════════════════════════
// CONSTRUIR MARCADOR DOM (N jugadores)
// ═══════════════════════════════════════════════════════
function construirMarcadorDOM() {
    const sb = document.getElementById('game-scoreboard');
    sb.innerHTML = '';
    estado.equipos.forEach((nombre, i) => {
        const block = document.createElement('div');
        block.className = 'score-team';
        block.dataset.idx = i;
        block.style.setProperty('--current-color', estado.colores[i]);

        const indicator = document.createElement('div');
        indicator.className = 'team-indicator';

        const info = document.createElement('div');
        info.className = 'team-info';

        const nameEl = document.createElement('div');
        nameEl.className = 'team-name';
        nameEl.textContent = nombre;

        const scoreEl = document.createElement('div');
        scoreEl.className = 'team-score';
        scoreEl.textContent = '0';
        scoreEl.dataset.scoreIdx = i;

        const flag = document.createElement('div');
        flag.className = 'powerup-flag';
        flag.textContent = '⭐';

        info.appendChild(nameEl);
        info.appendChild(scoreEl);
        block.appendChild(indicator);
        block.appendChild(info);
        block.appendChild(flag);
        sb.appendChild(block);
    });
}

function construirColumnas() {
    const area = document.getElementById('columnsArea');
    area.innerHTML = '';
    const grid = document.getElementById('fallGrid');
    grid.innerHTML = '';

    estado.columnas.forEach(cat => {
        const info = COLORES[cat];
        const btn = document.createElement('button');
        btn.className = 'col-btn';
        btn.dataset.cat = cat;
        btn.style.setProperty('--col-color', info.color);
        btn.innerHTML = `
            <div class="col-dot"></div>
            <div class="col-name">${cat}</div>
        `;
        btn.addEventListener('click', () => evaluarRespuesta(cat));
        area.appendChild(btn);

        // líneas de guía en zona caída
        const lane = document.createElement('div');
        lane.className = 'fall-lane';
        grid.appendChild(lane);
    });
}

// ═══════════════════════════════════════════════════════
// MARCADOR
// ═══════════════════════════════════════════════════════
function actualizarMarcador() {
    // Actualizar puntos y resaltado en marcador dinámico
    document.querySelectorAll('.score-team').forEach(block => {
        const i = parseInt(block.dataset.idx);
        const scoreEl = block.querySelector('[data-score-idx]');
        if (scoreEl) scoreEl.textContent = estado.puntos[i];
        block.classList.toggle('active-team', i === estado.turnoActual);
        block.classList.toggle('has-x2', estado.x2Pendiente[i]);
    });

    // Status bar
    document.getElementById('status-nivel').textContent = `Nivel ${estado.nivel}`;
    const turnoLabel = estado.equipos.length > 1
        ? `Turno: ${estado.equipos[estado.turnoActual]}`
        : estado.equipos[0];
    document.getElementById('status-turno').textContent = turnoLabel;
    document.getElementById('status-palabra').textContent = `Palabra ${estado.palabraEnNivel + 1}/10`;
}

// ═══════════════════════════════════════════════════════
// SELECCIONAR PALABRA
// ═══════════════════════════════════════════════════════
function elegirPalabra() {
    const cats = estado.columnas;
    // mezclar categorías para evitar siempre la misma
    const catsMezcladas = shuffled(cats);

    for (const cat of catsMezcladas) {
        const pool = palabrasPorCategoria[cat];
        const disponibles = pool.filter(p => !estado.palabrasUsadas.has(p));
        if (disponibles.length > 0) {
            const palabra = aleatorio(disponibles);
            estado.palabrasUsadas.add(palabra);
            return { palabra, cat };
        }
    }
    // Si se agotaron, limpiar y reintentar con todas
    estado.palabrasUsadas.clear();
    const cat = aleatorio(cats);
    const palabra = aleatorio(palabrasPorCategoria[cat]);
    estado.palabrasUsadas.add(palabra);
    return { palabra, cat };
}

// ═══════════════════════════════════════════════════════
// POWER-UP
// ═══════════════════════════════════════════════════════
function debeAparecerPowerup() {
    // Cada ~8 palabras, con cierta aleatoriedad
    return estado.palabrasTotales > 0 && (estado.palabrasTotales % 8 === 0) && Math.random() < 0.75;
}

function mostrarPowerupDisponible(tipo) {
    estado.powerupDisponible = tipo;
    const info = POWERUP_INFO[tipo];
    const notice = document.getElementById('powerupNotice');
    document.getElementById('powerupNoticeIcon').innerHTML = info.icon;
    document.getElementById('powerupNoticeText').textContent = info.texto;
    notice.classList.remove('show');
    // forzar reflow
    void notice.offsetWidth;
    notice.classList.add('show');
    // recoger el powerup automáticamente al siguiente acierto
}

function activarPowerup(tipo) {
    estado.powerupActivo = tipo;
    estado.powerupDisponible = null;
    const info = POWERUP_INFO[tipo];
    const badge = document.getElementById('powerupActiveBadge');
    document.getElementById('powerupBadgeIcon').innerHTML = info.icon;
    document.getElementById('powerupBadgeText').textContent = info.badge;
    badge.style.display = 'flex';

    if (tipo === 'congelar') {
        // Pausar la animación
        const fw = document.getElementById('fallingWord');
        fw.style.animationPlayState = 'paused';
        // Pausar el timer de progreso y palabra
        clearInterval(estado.progressTimer);
        // Reanudar tras 3 segundos
        setTimeout(() => {
            fw.style.animationPlayState = 'running';
            iniciarProgressBar();
            badge.style.display = 'none';
            estado.powerupActivo = null;
        }, 3000);

    } else if (tipo === 'pista') {
        // Resaltar la columna correcta 1 segundo
        const colBtns = document.querySelectorAll('.col-btn');
        colBtns.forEach(btn => {
            if (btn.dataset.cat === estado.categoriaActual) {
                btn.classList.add('hint-glow');
                setTimeout(() => {
                    btn.classList.remove('hint-glow');
                    badge.style.display = 'none';
                    estado.powerupActivo = null;
                }, 1200);
            }
        });

    } else if (tipo === 'x2') {
        // Marcar x2 para el equipo actual
        estado.x2Pendiente[estado.turnoActual] = true;
        actualizarMarcador();
        setTimeout(() => {
            badge.style.display = 'none';
            estado.powerupActivo = null;
        }, 1500);
    }
}

// ═══════════════════════════════════════════════════════
// LANZAR PALABRA
// ═══════════════════════════════════════════════════════
function lanzarPalabra() {
    if (!estado.juegoActivo) estado.juegoActivo = true;
    actualizarMarcador();

    // Comprobar power-up
    if (debeAparecerPowerup()) {
        const tipo = aleatorio(POWERUPS);
        mostrarPowerupDisponible(tipo);
    }

    const { palabra, cat } = elegirPalabra();
    estado.palabraActual = palabra;
    estado.categoriaActual = cat;
    estado.palabrasTotales++;

    const fw = document.getElementById('fallingWord');
    const colInfo = COLORES[cat];

    // Preparar elemento (sin color de categoría para no dar pistas)
    fw.textContent = palabra;
    fw.style.cssText = `
        --word-color: var(--text-secondary);
        display: block;
        top: -70px;
        animation: none;
        opacity: 1;
        transform: translateX(-50%) scale(1) rotate(0deg);
    `;

    // Forzar reflow antes de iniciar animación
    void fw.offsetWidth;

    const vel = VELOCIDADES[estado.nivel];
    fw.style.animation = `caer ${vel}ms linear forwards`;
    fw.classList.remove('acierto', 'fallo', 'cayendo');
    estado.startTime = Date.now();

    // Timer: cuando termina la animación = tiempo agotado
    clearTimeout(estado.animTimer);
    estado.animTimer = setTimeout(() => {
        procesarFallo(false); // tiempo agotado, no respuesta incorrecta
    }, vel);

    // Barra de progreso
    iniciarProgressBar();
}

// ═══════════════════════════════════════════════════════
// BARRA DE PROGRESO
// ═══════════════════════════════════════════════════════
function iniciarProgressBar() {
    clearInterval(estado.progressTimer);
    const vel = VELOCIDADES[estado.nivel];
    const fill = document.getElementById('progressFill');
    const startTime = Date.now();

    fill.style.width = '100%';

    estado.progressTimer = setInterval(() => {
        const elapsed = Date.now() - startTime;
        const pct = Math.max(0, 100 - (elapsed / vel) * 100);
        fill.style.width = pct + '%';
        if (pct <= 0) clearInterval(estado.progressTimer);
    }, 50);
}

// ═══════════════════════════════════════════════════════
// EVALUAR RESPUESTA
// ═══════════════════════════════════════════════════════
function evaluarRespuesta(catElegida) {
    if (!estado.juegoActivo) return;
    estado.juegoActivo = false;

    // Cancelar timers
    clearTimeout(estado.animTimer);
    clearInterval(estado.progressTimer);

    const esCorrecta = catElegida === estado.categoriaActual;

    if (esCorrecta) {
        procesarAcierto(catElegida);
    } else {
        procesarFallo(true, catElegida);
    }
}

function procesarAcierto(cat) {
    const fw = document.getElementById('fallingWord');
    const fz = document.getElementById('fallZone');

    // Animación acierto
    fw.style.animation = 'none';
    void fw.offsetWidth;
    fw.classList.add('acierto');
    fz.classList.remove('flash-fallo');
    fz.classList.add('flash-acierto');
    setTimeout(() => fz.classList.remove('flash-acierto'), 400);

    // Flash columna correcta
    flashColumna(cat, true);

    // Puntos
    let pts = 2;
    if (estado.x2Pendiente[estado.turnoActual]) {
        pts = 4;
        estado.x2Pendiente[estado.turnoActual] = false;
    }
    estado.puntos[estado.turnoActual] += pts;

    // Activar power-up si había disponible
    if (estado.powerupDisponible) {
        activarPowerup(estado.powerupDisponible);
    }

    // Feedback visual
    mostrarFeedback('✓', '#22c55e');
    mostrarPuntos(`+${pts}`, '#22c55e');

    setTimeout(siguientePaso, 600);
}

function procesarFallo(respuestaIncorrecta = false, catElegida = null) {
    const fw = document.getElementById('fallingWord');
    const fz = document.getElementById('fallZone');

    // Animación fallo
    fw.style.animation = 'none';
    void fw.offsetWidth;
    fw.classList.add('fallo');
    fz.classList.remove('flash-acierto');
    fz.classList.add('flash-fallo');
    setTimeout(() => fz.classList.remove('flash-fallo'), 400);

    // Flash columna incorrecta si la hubo
    if (respuestaIncorrecta && catElegida) {
        flashColumna(catElegida, false);
    }

    // Puntos: -1
    estado.puntos[estado.turnoActual] = Math.max(0, estado.puntos[estado.turnoActual] - 1);

    // Feedback visual
    mostrarFeedback('✗', '#ef4444');
    mostrarPuntos('-1', '#ef4444');

    estado.juegoActivo = false;
    setTimeout(siguientePaso, 600);
}

// ═══════════════════════════════════════════════════════
// FLASH COLUMNA
// ═══════════════════════════════════════════════════════
function flashColumna(cat, ok) {
    const colBtns = document.querySelectorAll('.col-btn');
    colBtns.forEach(btn => {
        if (btn.dataset.cat === cat) {
            btn.classList.remove('flash-ok', 'flash-err');
            void btn.offsetWidth;
            btn.classList.add(ok ? 'flash-ok' : 'flash-err');
            setTimeout(() => btn.classList.remove('flash-ok', 'flash-err'), 450);
        }
    });
}

// ═══════════════════════════════════════════════════════
// FEEDBACK FLOTANTE
// ═══════════════════════════════════════════════════════
function mostrarFeedback(simbolo, color) {
    const el = document.getElementById('feedbackFloat');
    el.textContent = simbolo;
    el.style.color = color;
    el.classList.remove('show');
    void el.offsetWidth;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 800);
}

function mostrarPuntos(texto, color) {
    const fz = document.getElementById('fallZone');
    const el = document.createElement('div');
    el.className = 'points-float';
    el.textContent = texto;
    el.style.color = color;
    el.style.top = '50%';
    fz.appendChild(el);
    void el.offsetWidth;
    el.classList.add('show');
    setTimeout(() => el.remove(), 900);
}

// ═══════════════════════════════════════════════════════
// SIGUIENTE PASO LÓGICO
// ═══════════════════════════════════════════════════════
function siguientePaso() {
    estado.palabraEnNivel++;
    actualizarMarcador();

    const totalNivel = 10;

    if (estado.palabraEnNivel >= totalNivel) {
        finDeTurno();
    } else {
        // Ciclar entre N participantes (si hay 1, siempre turno 0)
        if (estado.equipos.length > 1) {
            estado.turnoActual = (estado.turnoActual + 1) % estado.equipos.length;
        }
        estado.juegoActivo = true;
        lanzarPalabra();
    }
}

function finDeTurno() {
    if (estado.nivel >= 3) {
        mostrarResultados();
        return;
    }

    estado.nivel++;
    estado.palabraEnNivel = 0;

    // Un solo jugador: sin pantalla intermedia
    if (estado.equipos.length === 1) {
        actualizarMarcador();
        mostrarPreNivel();
        return;
    }

    // N > 1: mostrar entre-turnos con marcador completo
    estado.turnoActual = (estado.turnoActual + 1) % estado.equipos.length;
    actualizarMarcador();
    document.getElementById('et-titulo').textContent = `Fin del Nivel ${estado.nivel - 1}`;

    // Construir marcador dinámico en et-scores
    const etScores = document.getElementById('et-scores');
    etScores.innerHTML = '';
    estado.equipos.forEach((nombre, i) => {
        const block = document.createElement('div');
        block.className = 'et-score-block';
        const nameEl = document.createElement('div');
        nameEl.className = 'et-team-name';
        nameEl.textContent = nombre;
        const scoreEl = document.createElement('div');
        scoreEl.className = 'et-team-score';
        scoreEl.style.color = estado.colores[i];
        scoreEl.textContent = estado.puntos[i];
        block.appendChild(nameEl);
        block.appendChild(scoreEl);
        etScores.appendChild(block);
    });

    const infoEl = document.getElementById('et-next-info');
    infoEl.textContent = '';
    infoEl.appendChild(document.createTextNode(
        `Nivel ${estado.nivel} — ${(VELOCIDADES[estado.nivel]/1000).toFixed(1)}s  |  Turno: `
    ));
    const sp = document.createElement('strong');
    sp.style.color = estado.colores[estado.turnoActual];
    sp.textContent = estado.equipos[estado.turnoActual];
    infoEl.appendChild(sp);

    showScreen('screen-entreturnos');
}

document.getElementById('btnSiguiente').addEventListener('click', () => {
    construirColumnas();
    actualizarMarcador();
    showScreen('screen-game');
    estado.juegoActivo = true;
    mostrarPreNivel();
});

// Sobrescribir btnListo para el caso de nivel 2/3
document.getElementById('btnListo').addEventListener('click', function handler() {
    // ya lo gestiona el handler previo, aquí es suficiente
}, { once: false });

// ═══════════════════════════════════════════════════════
// RESULTADOS
// ═══════════════════════════════════════════════════════
function mostrarResultados() {
    const ganadorName  = document.getElementById('res-ganador-name');
    const ganadorLabel = document.getElementById('res-ganador-label');
    const trophy = document.getElementById('res-trophy');
    ganadorName.classList.remove('empate');

    // Ordenar por puntos para el ranking
    const ranking = estado.equipos
        .map((nombre, i) => ({ nombre, pts: estado.puntos[i], color: estado.colores[i] }))
        .sort((a, b) => b.pts - a.pts);

    // Construir tabla de resultados dinámica
    const resScores = document.getElementById('resultado-scores');
    resScores.innerHTML = '';
    ranking.forEach((jugador, pos) => {
        const block = document.createElement('div');
        block.className = 'res-score-block' + (pos === 0 ? ' ganador-block' : '');
        const nameEl = document.createElement('div');
        nameEl.className = 'res-team-name';
        nameEl.textContent = (ranking.length > 1 ? `${pos + 1}. ` : '') + jugador.nombre;
        const scoreEl = document.createElement('div');
        scoreEl.className = 'res-team-score';
        scoreEl.style.color = jugador.color;
        scoreEl.textContent = jugador.pts;
        block.appendChild(nameEl);
        block.appendChild(scoreEl);
        resScores.appendChild(block);
    });

    // Cabecera de resultado
    if (estado.equipos.length === 1) {
        const pts = estado.puntos[0];
        ganadorName.textContent = estado.equipos[0];
        ganadorLabel.textContent = `${pts} puntos`;
        trophy.textContent = pts >= 20 ? '🏆' : pts >= 10 ? '⭐' : '💪';
    } else if (ranking[0].pts === ranking[1].pts) {
        ganadorName.textContent = '¡Empate!';
        ganadorName.classList.add('empate');
        ganadorLabel.textContent = 'Resultado';
        trophy.textContent = '🤝';
    } else {
        ganadorName.textContent = ranking[0].nombre;
        ganadorLabel.textContent = '¡Ganador!';
        trophy.textContent = '🏆';
    }

    showScreen('screen-resultado');
}

document.getElementById('btnNueva').addEventListener('click', () => {
    estado.puntos = estado.puntos.map(() => 0);
    estado.nivel = 1;
    estado.turnoActual = 0;
    estado.palabraEnNivel = 0;
    estado.palabrasTotales = 0;
    estado.palabrasUsadas = new Set();
    estado.x2Pendiente = [false, false];
    estado.powerupActivo = null;
    estado.powerupDisponible = null;
    document.getElementById('powerupActiveBadge').style.display = 'none';
    clearTimeout(estado.animTimer);
    clearInterval(estado.progressTimer);
    showScreen('screen-setup');
});

(function() {
    const btn = document.getElementById('btnListo');

})();

// ═══════════════════════════════════════════════════════
// PAUSA / STOP
// ═══════════════════════════════════════════════════════
function togglePausa() {
    if (estado.pausado) {
        reanudarPartida();
    } else {
        pausarPartida();
    }
}

function pausarPartida() {
    if (!estado.juegoActivo || estado.pausado) return;
    estado.pausado = true;

    // Parar timers
    clearTimeout(estado.animTimer);
    clearInterval(estado.progressTimer);

    // Pausar animación CSS de la palabra y calcular tiempo restante
    const fw = document.getElementById('fallingWord');
    if (fw) {
        estado.tiempoRestante = VELOCIDADES[estado.nivel] - (Date.now() - estado.startTime);
        if (estado.tiempoRestante < 0) estado.tiempoRestante = 0;
        fw.style.animationPlayState = 'paused';
    }

    // Actualizar botón
    const btn = document.getElementById('btnPause');
    if (btn) btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg> Continuar';

    // Mostrar overlay
    document.getElementById('pauseOverlay').classList.add('visible');
}

function reanudarPartida() {
    if (!estado.pausado) return;
    estado.pausado = false;

    // Ocultar overlay
    document.getElementById('pauseOverlay').classList.remove('visible');

    // Actualizar botón
    const btn = document.getElementById('btnPause');
    if (btn) btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> Pausa';

    // Reanudar animación CSS
    const fw = document.getElementById('fallingWord');
    if (fw) fw.style.animationPlayState = 'running';

    // Reiniciar timers con tiempo restante
    const tiempoRestante = Math.max(estado.tiempoRestante, 500);
    estado.startTime = Date.now() - (VELOCIDADES[estado.nivel] - tiempoRestante);

    clearTimeout(estado.animTimer);
    estado.animTimer = setTimeout(() => {
        if (!estado.pausado) procesarFallo(false);
    }, tiempoRestante);

    // Reiniciar barra de progreso desde el porcentaje restante
    clearInterval(estado.progressTimer);
    const fill = document.getElementById('progressFill');
    const vel = VELOCIDADES[estado.nivel];
    const startRef = Date.now();
    const pctInicio = (tiempoRestante / vel) * 100;
    estado.progressTimer = setInterval(() => {
        const elapsed = Date.now() - startRef;
        const pct = Math.max(0, pctInicio - (elapsed / vel) * 100);
        if (fill) fill.style.width = pct + '%';
        if (pct <= 0) clearInterval(estado.progressTimer);
    }, 50);
}

function confirmarStop() {
    if (confirm('¿Reiniciar la partida?')) {
        pararPartida();
    }
}

function pararPartida() {
    // Limpiar todo
    clearTimeout(estado.animTimer);
    clearInterval(estado.progressTimer);
    estado.pausado = false;
    estado.juegoActivo = false;
    document.getElementById('pauseOverlay').classList.remove('visible');

    // Restaurar botón pausa
    const btn = document.getElementById('btnPause');
    if (btn) btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> Pausa';

    // Volver a setup
    showScreen('screen-setup');
}

// ═══════════════════════════════════════════════════════
// TECLADO: columnas con teclas numéricas (accesibilidad de clase)
// ═══════════════════════════════════════════════════════
document.addEventListener('keydown', (e) => {
    const num = parseInt(e.key);
    if (!isNaN(num) && num >= 1 && num <= 6) {
        const idx = num - 1;
        if (idx < estado.columnas.length && estado.juegoActivo) {
            evaluarRespuesta(estado.columnas[idx]);
        }
    }
});
